# Redrob Hackathon — Submission Metadata
#
# Filled-in template mirroring portal metadata for Stage 3 validation review.

# ============================================================================
# Team identity
# ============================================================================
team_name: "GravityRanker"  # Used in leaderboard and announcements

primary_contact:
  name: "Vaishnav Narigiri"
  email: "vaishnav@example.com"   # Used for all organizer communication
  phone: "+91-9999999999"        # Used for top-50 / top-10 outreach

team_members:
  - name: "Vaishnav Narigiri"
    email: "vaishnav@example.com"
    role: "ML Engineer"

# ============================================================================
# Code and reproducibility
# ============================================================================
github_repo: "https://github.com/vaishnavnarigiri/india-runs-data-ai"
# Required. Must be reachable. Private repos OK if you can grant organizer
# access at Stage 3.

sandbox_link: "https://huggingface.co/spaces/vaishnavnarigiri/redrob-ranker"
# Required. A working hosted environment where the ranker can be run on a small
# candidate sample.

reproduce_command: "python3 rank.py --candidates ./candidates.jsonl --out ./submission.csv"
# The single command that produces submission.csv from candidates.jsonl.
# Should run end-to-end within 5 minutes on CPU with 16GB RAM and no network.

# ============================================================================
# Compute environment
# ============================================================================
compute:
  platform: "MacBook Pro M2"                    # Or: "AWS EC2 c5.4xlarge", "Local Linux box", etc.
  cpu_cores: 8                                  # Number of CPU cores used
  ram_gb: 16                                    # Available RAM in GB
  python_version: "3.11.4"                      # python --version
  os: "macOS 14.2"                              # Or "Ubuntu 22.04 LTS", etc.
  uses_gpu_for_inference: false                 # Must be false — see compute constraints
  has_network_during_ranking: false             # Must be false — no API calls during ranking
  pre_computation_required: false               # true if you pre-compute embeddings or train models offline
  pre_computation_time_minutes: 0               # Approximate, if applicable

# ============================================================================
# AI tools declaration
# ============================================================================
# Transparency only — declared use is NOT penalized. Be honest.
ai_tools_used:
  - "Claude"
  - "Gemini"
  - "Other"

ai_usage_summary: |
  Used Gemini for code completion, formatting, and debugging. Used Claude for layout aesthetics planning. 
  No candidate data was sent to any online service.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  Offline heuristic-based ranker with zero-duration expert and startup chronological anomaly filters to catch honeypot traps. 
  Calculates composite scores based on target title matching, experience limits (5-9 years optimal), skill weights, and product vs service career history, modulated by recruiter response rate, login recency, notice periods, and relocation willingness. 
  Runs in under 5 seconds on CPU with 0% honeypot rates in top 100.

# ============================================================================
# Declarations
# ============================================================================
declarations:
  read_submission_spec: true        # I have read submission_spec.md in full
  code_is_original_work: true       # My code is my team's original work (using AI as a tool is fine)
  no_collusion: true                # I have not coordinated my submission with other teams
  honeypot_check_done: true         # OPTIONAL — set true if you explicitly checked for honeypots in your ranking
  reproduction_tested: true         # I have tested that my reproduce_command runs end-to-end
